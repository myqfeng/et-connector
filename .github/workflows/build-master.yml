name: Build Master

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置非交互式环境
        run: echo "DEBIAN_FRONTEND=noninteractive" | sudo tee -a /etc/environment

      - name: 运行一键编译打包脚本
        run: |
          chmod +x shell/workflow-linux-deb.sh
          sudo ./shell/workflow-linux-deb.sh

      - name: 上传 DEB 包
        uses: actions/upload-artifact@v4
        with:
          name: EasyTierConnector-linux-amd64
          path: Install/*.deb

  build-windows:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 MinGW 工具链和 Qt
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-qt6

      - name: Install Inno Setup
        shell: pwsh
        run: |
          if (-not (Get-Command "iscc" -ErrorAction SilentlyContinue)) {
            winget install -e --id JRSoftware.InnoSetup --accept-source-agreements --accept-package-agreements
          } else {
            Write-Host "Inno Setup 已安装，跳过。"
          }

      - name: Configure
        shell: msys2 {0}
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -G "Ninja"

      - name: Build
        shell: msys2 {0}
        run: cmake --build build --config Release --parallel

      - name: Install
        shell: msys2 {0}
        run: cmake --install build --config Release

      - name: 提取版本号
        shell: pwsh
        run: |
          $content = Get-Content CMakeLists.txt -Raw
          if ($content -match 'project\(EasyTierConnector VERSION ([0-9.]+)') {
            $version = $matches[1]
            Write-Host "版本号: $version"
            "VERSION=$version" >> $env:GITHUB_ENV
          } else {
            Write-Error "无法从 CMakeLists.txt 提取版本号"
            exit 1
          }

      - name: Build installer
        shell: pwsh
        run: |
          & ".\package\windows\build_win.ps1" --version $env:VERSION

      - name: 上传安装包
        uses: actions/upload-artifact@v4
        with:
          name: EasyTierConnector-win-amd64
          path: Install/*.exe
