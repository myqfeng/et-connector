name: Build PR

on:
  push:
    branches: ['pr**']
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装构建依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgl1-mesa-dev libxkbcommon-dev

      - name: 安装 aqtinstall
        run: pip install aqtinstall

      - name: 下载 Qt 6.10.3
        run: aqt install-qt linux desktop 6.10.3 gcc_64 -O ${{ runner.temp }}/Qt

      - name: 提取版本号
        run: |
          VERSION=$(grep 'project(EasyTierConnector VERSION' CMakeLists.txt | sed -n 's/.*VERSION \([0-9.]*\).*/\1/p')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      # === 社区版 ===
      - name: 清理旧构建 (社区版)
        run: rm -rf build Install

      - name: Configure (社区版)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${{ runner.temp }}/Qt/6.10.3/gcc_64" -DIS_COMMUNITY_VER=ON

      - name: Build (社区版)
        run: cmake --build build --parallel $(nproc)

      - name: Install (社区版)
        run: cmake --install build

      - name: 打包 DEB (社区版)
        run: bash package/linux/deb/build_deb.sh --version ${{ env.VERSION }}

      - name: 上传 DEB 包 (社区版)
        uses: actions/upload-artifact@v5
        with:
          name: EasyTierConnector-Community-linux-amd64
          path: Install/*.deb

      # === 专业版 ===
      - name: 清理旧构建 (专业版)
        run: rm -rf build Install

      - name: Configure (专业版)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${{ runner.temp }}/Qt/6.10.3/gcc_64" -DIS_COMMUNITY_VER=OFF

      - name: Build (专业版)
        run: cmake --build build --parallel $(nproc)

      - name: Install (专业版)
        run: cmake --install build

      - name: 打包 DEB (专业版)
        run: bash package/linux/deb/build_deb.sh --version ${{ env.VERSION }} --pro

      - name: 上传 DEB 包 (专业版)
        uses: actions/upload-artifact@v5
        with:
          name: EasyTierConnector-Pro-linux-amd64
          path: Install/*.deb

  build-windows:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 aqtinstall
        shell: pwsh
        run: pip install aqtinstall

      - name: 下载 Qt 6.10.3
        shell: pwsh
        run: aqt install-qt windows desktop 6.10.3 win64_mingw -O ${{ runner.temp }}\Qt

      - name: 下载 MinGW 工具链
        shell: pwsh
        run: aqt install-tool windows desktop tools_mingw1310 -O ${{ runner.temp }}\Qt

      - name: 下载 CMake & Ninja
        shell: pwsh
        run: |
          aqt install-tool windows desktop tools_cmake -O ${{ runner.temp }}\Qt
          aqt install-tool windows desktop tools_ninja -O ${{ runner.temp }}\Qt

      - name: 设置 MinGW + Qt 环境
        shell: bash
        run: |
          QT_VER=$(ls "$RUNNER_TEMP/Qt" | grep -E '^[0-9]+\.[0-9]+' | head -1)
          MINGW_DIR=$(find "$RUNNER_TEMP/Qt/Tools" -maxdepth 1 -name "mingw*_64" -type d | head -1)
          echo "QT_DIR=$RUNNER_TEMP/Qt/$QT_VER/mingw_64" >> $GITHUB_ENV
          echo "$MINGW_DIR/bin" >> $GITHUB_PATH
          echo "$RUNNER_TEMP/Qt/Tools/CMake_64/bin" >> $GITHUB_PATH
          echo "$RUNNER_TEMP/Qt/Tools/Ninja" >> $GITHUB_PATH
          echo "$RUNNER_TEMP/Qt/$QT_VER/mingw_64/bin" >> $GITHUB_PATH

      - name: Install Inno Setup
        shell: pwsh
        run: |
          if (-not (Get-Command "iscc" -ErrorAction SilentlyContinue)) {
            winget install -e --id JRSoftware.InnoSetup --accept-source-agreements --accept-package-agreements
          } else {
            Write-Host "Inno Setup 已安装，跳过。"
          }

      - name: 提取版本号
        shell: pwsh
        run: |
          $content = Get-Content CMakeLists.txt -Raw
          if ($content -match 'project\(EasyTierConnector VERSION ([0-9.]+)') {
            $version = $matches[1]
            Write-Host "版本号: $version"
            "VERSION=$version" >> $env:GITHUB_ENV
          } else {
            Write-Error "无法从 CMakeLists.txt 提取版本号"
            exit 1
          }

      # === 社区版 ===
      - name: 清理旧构建 (社区版)
        shell: pwsh
        run: Remove-Item -Recurse -Force build, Install -ErrorAction SilentlyContinue

      - name: Configure (社区版)
        shell: bash
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$QT_DIR" -DIS_COMMUNITY_VER=ON -G "Ninja"

      - name: Build (社区版)
        shell: bash
        run: cmake --build build --config Release

      - name: Install (社区版)
        shell: bash
        run: cmake --install build --config Release

      - name: 打包安装包 (社区版)
        shell: pwsh
        run: & ".\package\windows\build_win.ps1" --version $env:VERSION

      - name: 上传安装包 (社区版)
        uses: actions/upload-artifact@v5
        with:
          name: EasyTierConnector-Community-win-amd64
          path: Install/*.exe

      # === 专业版 ===
      - name: 清理旧构建 (专业版)
        shell: pwsh
        run: Remove-Item -Recurse -Force build, Install -ErrorAction SilentlyContinue

      - name: Configure (专业版)
        shell: bash
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$QT_DIR" -DIS_COMMUNITY_VER=OFF -G "Ninja"

      - name: Build (专业版)
        shell: bash
        run: cmake --build build --config Release

      - name: Install (专业版)
        shell: bash
        run: cmake --install build --config Release

      - name: 打包安装包 (专业版)
        shell: pwsh
        run: & ".\package\windows\build_win.ps1" --version $env:VERSION --pro

      - name: 上传安装包 (专业版)
        uses: actions/upload-artifact@v5
        with:
          name: EasyTierConnector-Pro-win-amd64
          path: Install/*.exe

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            arch: arm64
          - runner: macos-13
            arch: amd64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: Install Qt 6.10.3
        uses: jurplel/install-qt-action@v5
        with:
          version: '6.10.3'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'

      # === 社区版 ===
      - name: 清理旧构建 (社区版)
        run: rm -rf build Install

      - name: Configure (社区版)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DIS_COMMUNITY_VER=ON

      - name: Build (社区版)
        run: cmake --build build --parallel $(sysctl -n hw.logicalcpu)

      - name: Install (社区版)
        run: cmake --install build

      - name: Create DMG (社区版)
        run: bash package/macos/build_dmg.sh

      - name: 上传 DMG 包 (社区版)
        uses: actions/upload-artifact@v5
        with:
          name: EasyTierConnector-Community-mac-${{ matrix.arch }}
          path: Install/*.dmg

      # === 专业版 ===
      - name: 清理旧构建 (专业版)
        run: rm -rf build Install

      - name: Configure (专业版)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DIS_COMMUNITY_VER=OFF

      - name: Build (专业版)
        run: cmake --build build --parallel $(sysctl -n hw.logicalcpu)

      - name: Install (专业版)
        run: cmake --install build

      - name: Create DMG (专业版)
        run: bash package/macos/build_dmg.sh --pro

      - name: 上传 DMG 包 (专业版)
        uses: actions/upload-artifact@v5
        with:
          name: EasyTierConnector-Pro-mac-${{ matrix.arch }}
          path: Install/*.dmg
